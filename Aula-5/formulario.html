<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="form-page">
    <form action="post.html" method="post" class="form-login">
        <h3>Login</h3>
        <label for="nome" class="inputs">Nome:</label>
        <input type="text" class="inputs texto" name="nome" id="nome" placeholder="Digite seu Nome">
        <label for="email" class="inputs">E-mail:</label>
        <input type="email" class="inputs texto" name="email" id="email" placeholder="Digite seu E-mail">
        <label for="senha" class="inputs">Senha</label>
        <input type="password" class="inputs texto" name="senha" id="senha" placeholder="Digite sua Senha">

        <input id="botao" type="submit" value="Enviar">
    </form>
</body>
</html>
